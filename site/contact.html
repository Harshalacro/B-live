<head>

</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <canvas id="starfield" aria-hidden="true"></canvas>
  <header class="site-header">
    <nav class="container">
      <a href="index.html" class="brand" aria-label="Harshal Pawar Home">HP</a>
      <button class="nav-toggle" aria-controls="primary-nav" aria-expanded="false" aria-label="Toggle navigation"><span></span><span></span></button>
      <ul id="primary-nav" class="nav">
        <li><a href="index.html">Home</a></li>

        <li><a class="active cta" href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="main" class="container section">
    <div class="section-head">
      <h1>Contact</h1>
    </div>
    <div class="contact-grid">
      <form id="contactForm" class="card" aria-label="Contact form">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" autocomplete="name" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        <div class="actions">
          <button class="btn btn-primary" type="submit">Send</button>
          <a class="btn btn-ghost" href="mailto:you@example.com">Open in email</a>
        </div>
      </form>
      <aside>
        <h2>Social</h2>
        <ul id="socialLinks" class="socials"></ul>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> Harshal Pawar.</p>
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
